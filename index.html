<!DOCTYPE html>
<html>

<head>
    <title>Basicness Assessment System</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 50px auto;
            padding: 20px;
        }

        input {
            display: block;
            margin-bottom: 15px;
            padding: 8px;
            width: 100%;
        }

        button {
            padding: 10px 20px;
        }

        #result {
            margin-top: 30px;
            white-space: pre-wrap;
        }

    </style>
</head>

<body>

    <h1>BASICNESS ASSESSMENT SYSTEM</h1>

    <input id="name" placeholder="Name">

    <input id="age" placeholder="Age">

    <input id="food" placeholder="Favourite Food">

    <button onclick="analyse()">
        Analyse Victim
    </button>

    <div id="result"></div>

    <script>

            function analyse() {

    let basicScore = 0;

    let name = document.getElementById("name").value;
    let age = Number(document.getElementById("age").value);
    let food = document.getElementById("food").value;

    if (name.trim() == "") {

        document.getElementById("result").innerText =
            "My guy you are not slick. that aint a name.";

        return;
    }

    if (name.toLowerCase() == "bella") {

        document.getElementById("result").innerText =
            "Creator detected.\nOpinion ignored.\nAnalysis cancelled.";

        return;
    }

    let firstLetter = name[0].toUpperCase();

    let nameRoast;

    if (["A","B","C","D","E","F","G","H"].includes(firstLetter)) {

        let insults = [
            "Did your parents feel sorry for you or.....",
            "Hm ok... its not that bad.... I mean it kinda is..",
            "No. ew. Change ur name"
        ];

        nameRoast =
            insults[Math.floor(Math.random() * insults.length)];

        basicScore += 20;

    }

    else if (["I","J","K","L","M","N","O","P"].includes(firstLetter)) {

        let insults = [
            "Please wash ur socks. I know u havent",
            "Saying everything is fine whilst literally not doing anything to fix it isnt problem solving btw",
            "Close ur freaking tabs its bothering me"
        ];

        nameRoast =
            insults[Math.floor(Math.random() * insults.length)];

        basicScore += 10;

    }

    else {

        let insults = [
            "Genuinely what is this search history bro",
            "I know you've played warframe at least once",
            "System error404"
        ];

        nameRoast =
            insults[Math.floor(Math.random() * insults.length)];
    }


    let ageRoast;

    if (age < 13) {

        ageRoast = "How the f- did you get this program child";
        basicScore += 5;

    }

    else if (age == 18) {

        ageRoast =
            "Ohkay so you like, think youre an adult right? Yeah cringe.";

        basicScore += 20;

    }

    else if (age < 25) {

        ageRoast =
            "Okay so youre broke and have no degree... right ok.";

        basicScore += 10;

    }

    else {

        ageRoast = "Are you a vampire?";
        basicScore -= 10;

    }


    let approvedFoods = [
        "pho",
        "sushi",
        "coffee",
        "monster"
    ];

    let foodRoast;

    if (approvedFoods.includes(food)) {

        foodRoast = "Good enough. I guess...";

    }

    else {

        let foodInsults = [
            "No.",
            "Wrong.",
            "Do you even have tastebuds??",
            "Thats a food. I said drink."
        ];

        foodRoast =
            foodInsults[Math.floor(Math.random() * foodInsults.length)];

        basicScore += 30;
    }


    let verdict;

    if (basicScore < 20) {

        verdict = "Wow. Youre normal. Weird.";

    }

    else if (basicScore < 40) {

        verdict = "Right. You like Taylor Swift dont you.";

    }

    else if (basicScore < 60) {

        verdict =
            "You do know you can have your own personality right? It doesn't need to be TikTok copy pasted.....";

    }

    else {

        verdict = "Basic final boss. Ew.";

    }


    document.getElementById("result").innerText =
        "ANALYSIS COMPLETE. THAT WAS AWFUL.\n\n" +

        "NAME ANALYSIS\n" +
        nameRoast +

        "\n\nAGE ANALYSIS\n" +
        ageRoast +

        "\n\nFOOD ANALYSIS\n" +
        foodRoast +

        "\n\nBASICNESS SCORE\n" +
        basicScore +

        "\n\nFINAL VERDICT\n" +
        verdict;
}

    </script>

</body>

</html>
